# values.yaml — default (production) Helm values
# Environment-specific files override individual keys only.

# ── Image ─────────────────────────────────────────────────────────────────────
image:
  repository: ghcr.io/your-org/securefin
  tag: "latest"
  pullPolicy: IfNotPresent

# ── Replica count (used when HPA is disabled) ─────────────────────────────────
replicaCount: 3

# ── Horizontal Pod Autoscaler ──────────────────────────────────────────────────
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

# ── PodDisruptionBudget ────────────────────────────────────────────────────────
podDisruptionBudget:
  minAvailable: 1

# ── Service ───────────────────────────────────────────────────────────────────
service:
  type: ClusterIP
  port: 80
  targetPort: 3000

# ── Ingress ───────────────────────────────────────────────────────────────────
ingress:
  enabled: true
  className: "nginx"
  host: "securefin.example.com"
  tls:
    enabled: true
    secretName: "securefin-tls"

# ── Resource limits ───────────────────────────────────────────────────────────
resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "500m"
    memory: "256Mi"

# ── Environment variables ─────────────────────────────────────────────────────
env:
  PORT: "3000"
  NODE_ENV: "production"
  LOG_LEVEL: "info"

# ── Probes ─────────────────────────────────────────────────────────────────────
livenessProbe:
  path: /health
  initialDelaySeconds: 10
  periodSeconds: 15

readinessProbe:
  path: /health
  initialDelaySeconds: 5
  periodSeconds: 10

# ── ServiceAccount ────────────────────────────────────────────────────────────
serviceAccount:
  annotations: {}
  # For AWS IRSA:
  # annotations:
  #   eks.amazonaws.com/role-arn: arn:aws:iam::123456789:role/securefin

# ── NetworkPolicy ─────────────────────────────────────────────────────────────
networkPolicy:
  enabled: true

# ── Observability ─────────────────────────────────────────────────────────────
metrics:
  serviceMonitor:
    enabled: true
    interval: "30s"
  grafanaDashboard:
    enabled: true
