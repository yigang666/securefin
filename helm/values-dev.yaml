# values-dev.yaml — development environment overrides
replicaCount: 1

autoscaling:
  enabled: false   # fixed replica count in dev

podDisruptionBudget:
  minAvailable: 0   # allow full disruption in dev

image:
  tag: "dev-latest"

ingress:
  host: "securefin-dev.example.com"
  tls:
    enabled: false

resources:
  requests:
    cpu: "50m"
    memory: "64Mi"
  limits:
    cpu: "200m"
    memory: "128Mi"

env:
  PORT: "3000"
  NODE_ENV: "development"
  LOG_LEVEL: "debug"

networkPolicy:
  enabled: false   # relaxed in dev for easier debugging

metrics:
  serviceMonitor:
    enabled: false
  grafanaDashboard:
    enabled: false
