# values-staging.yaml — staging environment overrides
replicaCount: 2

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5

image:
  tag: "staging-latest"

ingress:
  host: "securefin-staging.example.com"
  tls:
    enabled: true
    secretName: "securefin-staging-tls"

env:
  PORT: "3000"
  NODE_ENV: "staging"
  LOG_LEVEL: "info"
