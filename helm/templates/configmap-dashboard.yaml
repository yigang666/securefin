{{/*
  configmap-dashboard.yaml — Grafana Dashboard (as Code)
  A ConfigMap with the label grafana_dashboard: "1" is automatically imported
  by the Grafana sidecar when using the kube-prometheus-stack Helm chart.
  This means the dashboard is version-controlled and deployed with the app.
*/}}
{{- if .Values.metrics.grafanaDashboard.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-securefin-dashboard
  labels:
    app: securefin
    release: {{ .Release.Name }}
    grafana_dashboard: "1"   # triggers Grafana sidecar auto-import
data:
  securefin-dashboard.json: |
    {
      "title": "SecureFin",
      "uid": "securefin",
      "timezone": "browser",
      "panels": [
        {
          "id": 1,
          "title": "Transactions per Minute",
          "type": "stat",
          "gridPos": { "x": 0, "y": 0, "w": 6, "h": 4 },
          "targets": [{
            "expr": "rate(securefin_transactions_total[1m]) * 60",
            "legendFormat": "{{currency}}"
          }]
        },
        {
          "id": 2,
          "title": "Total Transactions",
          "type": "stat",
          "gridPos": { "x": 6, "y": 0, "w": 6, "h": 4 },
          "targets": [{
            "expr": "sum(securefin_transactions_total)"
          }]
        },
        {
          "id": 3,
          "title": "Request Latency (p99)",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 4, "w": 12, "h": 6 },
          "targets": [{
            "expr": "histogram_quantile(0.99, rate(securefin_http_request_duration_seconds_bucket[5m]))",
            "legendFormat": "p99 {{method}} {{path}}"
          }]
        },
        {
          "id": 4,
          "title": "Error Rate",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 10, "w": 12, "h": 6 },
          "targets": [{
            "expr": "rate(securefin_http_request_duration_seconds_count{status=~'4..|5..'}[5m])",
            "legendFormat": "errors {{status}}"
          }]
        }
      ],
      "refresh": "10s",
      "schemaVersion": 38
    }
{{- end }}
