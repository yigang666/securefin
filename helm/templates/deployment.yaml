{{/*
  deployment.yaml — Kubernetes Deployment for SecureFin
  Manages the rollout of the Node.js application pods.
  Includes:
    - SecurityContext (hardened: non-root, read-only fs, no privilege escalation)
    - Pod anti-affinity (spreads pods across nodes for HA)
    - Dedicated ServiceAccount with no API token
    - Resource limits and requests
    - Liveness + readiness probes
*/}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-securefin
  labels:
    app: securefin
    release: {{ .Release.Name }}
    chart: {{ .Chart.Name }}-{{ .Chart.Version }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  # When HPA is enabled, it manages replica count — do not set it here.
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      app: securefin
      release: {{ .Release.Name }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template:
    metadata:
      labels:
        app: securefin
        release: {{ .Release.Name }}
      annotations:
        # Force pod restart when values change (e.g. config updates)
        checksum/values: {{ .Values | toYaml | sha256sum }}
    spec:
      # Use dedicated ServiceAccount with no auto-mounted token
      serviceAccountName: {{ .Release.Name }}-securefin
      automountServiceAccountToken: false

      # Pod-level security: run as non-root, use RuntimeDefault seccomp profile
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault

      # Prefer scheduling pods on different nodes for HA
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels:
                    app: securefin

      containers:
        - name: securefin
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}

          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort }}
              protocol: TCP

          # Container-level security hardening
          securityContext:
            allowPrivilegeEscalation: false   # prevent sudo/setuid escalation
            readOnlyRootFilesystem: true       # filesystem is immutable at runtime
            capabilities:
              drop: ["ALL"]                    # drop all Linux capabilities

          env:
            {{- range $key, $value := .Values.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}

          # Writable temp dir for pino-pretty and other runtime temp files
          # readOnlyRootFilesystem: true requires explicit emptyDir mounts for writes
          volumeMounts:
            - name: tmp
              mountPath: /tmp

          livenessProbe:
            httpGet:
              path: {{ .Values.livenessProbe.path }}
              port: http
            initialDelaySeconds: {{ .Values.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.livenessProbe.periodSeconds }}
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: {{ .Values.readinessProbe.path }}
              port: http
            initialDelaySeconds: {{ .Values.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.readinessProbe.periodSeconds }}
            failureThreshold: 3

          resources:
            requests:
              cpu: {{ .Values.resources.requests.cpu }}
              memory: {{ .Values.resources.requests.memory }}
            limits:
              cpu: {{ .Values.resources.limits.cpu }}
              memory: {{ .Values.resources.limits.memory }}

      volumes:
        # Writable scratch space — required when readOnlyRootFilesystem: true
        - name: tmp
          emptyDir: {}
