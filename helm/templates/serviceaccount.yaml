{{/*
  serviceaccount.yaml — Kubernetes ServiceAccount
  Creates a dedicated ServiceAccount for the SecureFin pods.
  automountServiceAccountToken: false prevents pods from having an automatic
  Kubernetes API token mounted — since this app does not talk to the K8s API,
  mounting a token is an unnecessary attack surface.
  The annotations block supports cloud-provider Workload Identity (AWS IRSA /
  GCP Workload Identity) for future IAM integration without static credentials.
*/}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Release.Name }}-securefin
  labels:
    app: securefin
    release: {{ .Release.Name }}
  {{- if .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml .Values.serviceAccount.annotations | nindent 4 }}
  {{- end }}
# Do not auto-mount a K8s API token — this app has no need for API access.
automountServiceAccountToken: false
