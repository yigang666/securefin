# ci-cd.yml — SecureFin CI/CD pipeline
#
# Jobs (in order):
#   1. test    — Jest unit/integration tests
#   2. scan    — Security: Trivy, hadolint, gitleaks, dependency-review
#   3. build   — Multi-arch Docker build + push to GHCR + cosign sign + SBOM
#   4. deploy  — helm upgrade to matching K8s environment
#
# Secrets required:
#   GHCR_TOKEN          — GitHub PAT with packages:write
#   KUBECONFIG_DEV      — base64 kubeconfig for dev cluster
#   KUBECONFIG_STAGING  — base64 kubeconfig for staging cluster
#   KUBECONFIG_PROD     — base64 kubeconfig for prod cluster

name: CI/CD

on:
  push:
    branches: [dev, staging, main]
  pull_request:
    branches: [main, staging]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/securefin

jobs:
  # ── 1. Test ────────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: app/package-lock.json
      - run: npm ci
        working-directory: app
      - run: npm test
        working-directory: app

  # ── 2. Security Scan ───────────────────────────────────────────────────────
  scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      security-events: write   # upload SARIF results to GitHub Security tab

    steps:
      - uses: actions/checkout@v4

      # Dockerfile linting — catches FROM version pins, USER, etc.
      - name: Lint Dockerfile (hadolint)
        uses: hadolint/hadolint-action@v3
        with:
          dockerfile: app/Dockerfile
          failure-threshold: warning

      # Detect secrets committed to the repo
      - name: Secret scanning (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Helm chart linting
      - name: Helm lint
        run: |
          curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
          helm lint ./helm -f helm/values.yaml
          helm lint ./helm -f helm/values-dev.yaml
          helm lint ./helm -f helm/values-staging.yaml

      # Dependency vulnerability scan for PRs (compares base vs head)
      - name: Dependency review (PR only)
        if: github.event_name == 'pull_request'
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high

      # SAST — CodeQL static analysis
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript
      - name: CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:javascript"

  # ── 3. Build & Push ────────────────────────────────────────────────────────
  build:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: scan
    if: github.event_name == 'push'
    outputs:
      short_sha: ${{ steps.short_sha.outputs.sha }}
      digest: ${{ steps.build.outputs.digest }}

    permissions:
      contents: read
      packages: write
      id-token: write   # required for cosign keyless signing (OIDC)

    steps:
      - uses: actions/checkout@v4

      - name: Compute short SHA
        id: short_sha
        run: echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Set up QEMU (cross-platform build support)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=,format=short
            type=ref,event=branch

      # Multi-arch build: supports both x86-64 (cloud) and ARM64 (Graviton / Apple Silicon)
      - name: Build and push (multi-arch)
        id: build
        uses: docker/build-push-action@v5
        with:
          context: app
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache,mode=max

      # Install cosign for keyless image signing (no key management required)
      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      # Sign the image digest — verifiable without storing private keys
      - name: Sign image (cosign keyless)
        run: |
          cosign sign --yes \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}

      # Generate Software Bill of Materials — lists every dependency in the image
      - name: Generate SBOM (Syft)
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}
          format: spdx-json
          artifact-name: sbom-${{ steps.short_sha.outputs.sha }}.spdx.json

      # Scan the built image for known CVEs
      - name: Container vulnerability scan (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: 1

      - name: Upload Trivy results to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

  # ── 4. Deploy ──────────────────────────────────────────────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Resolve environment
        id: env
        run: |
          case "${{ github.ref_name }}" in
            dev)
              echo "env_name=dev"          >> $GITHUB_OUTPUT
              echo "values_file=helm/values-dev.yaml" >> $GITHUB_OUTPUT
              echo "kubeconfig=KUBECONFIG_DEV"         >> $GITHUB_OUTPUT
              ;;
            staging)
              echo "env_name=staging"      >> $GITHUB_OUTPUT
              echo "values_file=helm/values-staging.yaml" >> $GITHUB_OUTPUT
              echo "kubeconfig=KUBECONFIG_STAGING"         >> $GITHUB_OUTPUT
              ;;
            main)
              echo "env_name=production"   >> $GITHUB_OUTPUT
              echo "values_file=helm/values.yaml" >> $GITHUB_OUTPUT
              echo "kubeconfig=KUBECONFIG_PROD"    >> $GITHUB_OUTPUT
              ;;
          esac

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets[steps.env.outputs.kubeconfig] }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Install Helm
        uses: azure/setup-helm@v3
        with:
          version: "3.14.0"

      - name: Helm deploy
        run: |
          helm upgrade --install securefin ./helm \
            --namespace securefin-${{ steps.env.outputs.env_name }} \
            --create-namespace \
            -f ${{ steps.env.outputs.values_file }} \
            --set image.tag=${{ needs.build.outputs.short_sha }} \
            --atomic \
            --wait \
            --timeout 5m

      - name: Deploy summary
        run: |
          echo "## Deploy Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Key | Value |"   >> $GITHUB_STEP_SUMMARY
          echo "|---|---|"          >> $GITHUB_STEP_SUMMARY
          echo "| Environment | ${{ steps.env.outputs.env_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Image tag | ${{ needs.build.outputs.short_sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Image digest | ${{ needs.build.outputs.digest }} |" >> $GITHUB_STEP_SUMMARY
